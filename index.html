<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m4rba4s | SYSTEM NECROMANCER</title>
<style>
  :root {
    --bg-color: #050505;
    --opcode-color: #00FF41;
    --hex-color: #FF003C;
    --comment-color: #4A4A4A;
    --glitch-1: #FF00FF;
    --glitch-2: #00FFFF;
  }

  body, html {
    background: var(--bg-color);
    color: var(--opcode-color);
    font-family: 'Fira Code', 'Courier New', Consolas, monospace;
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow-x: hidden;
    text-shadow: 0 0 3px var(--opcode-color);
  }

  /* CRT Filter & Scanlines */
  body::after {
    content: " ";
    display: block;
    position: fixed;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 999;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
    opacity: 0.1;
  }

  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  .scanline-bar {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 8px;
    background: rgba(0, 255, 65, 0.15);
    opacity: 0.6;
    animation: scanline 6s linear infinite;
    pointer-events: none;
    z-index: 1000;
  }

  @keyframes flicker {
    0% { opacity: 0.95; }
    5% { opacity: 0.85; }
    10% { opacity: 0.95; }
    15% { opacity: 1; }
    100% { opacity: 1; }
  }

  .screen-container {
    padding: 24px;
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Top Header */
  .sys-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid var(--comment-color);
    padding-bottom: 16px;
    margin-bottom: 16px;
  }
  .sys-subtitle {
    font-size: 12px;
    color: var(--comment-color);
    margin-bottom: 4px;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .sys-title {
    font-size: 30px;
    font-weight: bold;
    letter-spacing: -0.05em;
    color: var(--opcode-color);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0;
  }
  .sys-title .skull {
    color: var(--hex-color);
  }
  .sys-title .badge {
    font-size: 12px;
    background: var(--opcode-color);
    color: var(--bg-color);
    padding: 0 4px;
    margin-left: 8px;
    letter-spacing: normal;
  }
  .sys-info {
    text-align: right;
    font-size: 12px;
    color: var(--comment-color);
  }
  .sys-info .threat {
    color: var(--hex-color);
    font-size: 10px;
    margin-top: 4px;
  }

  /* Boot Sequence */
  #boot-sequence {
    background: #0a0a0a;
    border: 1px solid var(--comment-color);
    padding: 12px;
    font-size: 11px;
    line-height: normal;
    min-height: 20px;
  }

  /* OS Container */
  #os {
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    overflow: hidden;
  }

  .sys-nav {
    display: flex;
    gap: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: -1px;
    z-index: 10;
  }
  .sys-nav .nav-item {
    padding: 8px 16px;
    color: var(--comment-color);
    cursor: pointer;
    border: 1px solid var(--comment-color);
    background: #050505;
    transition: all 0.2s;
  }
  .sys-nav .nav-item:hover {
    color: var(--opcode-color);
    background: #0a0a0a;
  }
  .sys-nav .nav-item.active {
    color: var(--hex-color);
    text-shadow: 0 0 5px var(--hex-color);
    border-bottom-color: #080808;
    background: #080808;
    position: relative;
    z-index: 12;
  }

  /* Layout */
  #hexGrid {
    flex-grow: 1;
    border: 1px solid var(--comment-color);
    background: #080808;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  /* Design HTML Hex Header */
  .hex-header {
    display: grid;
    grid-template-columns: 100px 1fr 240px 160px;
    background: #111;
  }
  .hex-header > div {
    padding: 8px;
    border-bottom: 1px solid var(--comment-color);
    color: var(--comment-color);
    font-weight: bold;
  }
  .hex-header > div:not(:last-child) {
    border-right: 1px solid var(--comment-color);
  }

  .hex-row {
    display: grid;
    grid-template-columns: 100px 1fr 240px 160px;
  }

  .hex-row > div {
    padding: 8px;
    border-bottom: 1px solid #1a1a1a;
  }
  .hex-row > div:not(:last-child) {
    border-right: 1px solid #1a1a1a;
  }
  
  .ascii {
    opacity: 0.6;
  }

  .addr { color: var(--comment-color); }
  .asm { color: var(--comment-color); }
  
  .hex span, .ascii span {
    cursor: crosshair;
    transition: color 0.1s, text-shadow 0.1s;
    display: inline-block;
  }

  .hex span { padding-right: 4px; }

  /* Hover Resonance Classes */
  .hl-active {
    color: var(--hex-color) !important;
    text-shadow: 0 0 8px var(--hex-color) !important;
    font-weight: bold;
  }

  /* CLI Container */
  #cli-container {
    margin-top: 16px;
    padding: 16px;
    background: #080808;
    border-top: 2px solid var(--hex-color);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .cli-input-line {
    display: flex;
    align-items: center;
  }

  .prompt {
    color: var(--hex-color);
    font-weight: bold;
    white-space: nowrap;
  }
  .prompt-separator {
    color: var(--comment-color);
    margin: 0 4px;
  }
  .prompt-dir {
    color: var(--opcode-color);
    margin-right: 12px;
  }

  #cli-input {
    background: transparent;
    border: none;
    color: var(--opcode-color);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    flex-grow: 1;
    letter-spacing: 0.025em;
  }

  #cli-output {
    margin-bottom: 10px;
    font-size: 12px;
  }

  .baphomet-art {
    color: var(--hex-color);
    text-shadow: 0 0 5px var(--hex-color);
    font-size: 12px;
    line-height: 1.1;
  }

  /* Glitch Protocol */
  .glitch-shake {
    animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
  }

  @keyframes shake {
    10%, 90% { transform: translate3d(-3px, 0, 0); }
    20%, 80% { transform: translate3d(5px, 0, 0); filter: hue-rotate(90deg); }
    30%, 50%, 70% { transform: translate3d(-10px, 0, 0); }
    40%, 60% { transform: translate3d(10px, 0, 0); filter: invert(1); }
  }

  ::-webkit-scrollbar {
    width: 8px;
    background: var(--bg-color);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--comment-color);
  }

  .watermark {
    position: absolute;
    bottom: 48px;
    right: 48px;
    color: var(--hex-color);
    opacity: 0.05;
    user-select: none;
    pointer-events: none;
    font-size: 128px;
    line-height: 1;
  }


</style>
</head>
<body>

<div class="scanline-bar"></div>

<div class="screen-container">

  <div id="boot-sequence"></div>

        <input type="text" id="cli-input" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
  </div>

  <div class="watermark">⛧</div>
</div>

<script>
  // BOOT SEQUENCE LOGIC
  const seq = [

    "LOADING eBPF_HELLFIRE_HOOKS... [OK]",
    "DECRYPTING m4rba4s_SOUL.bin... [OK]",
    "SYSCALL HIJACKING COMPLETE...",
    "WELCOME TO THE ABYSS, ILYA ⸸"
  ];
  
  const boot = document.getElementById("boot-sequence");
  let sIdx = 0;
  let cIdx = 0;
  
  function typeBoot() {

      setTimeout(() => {
        boot.style.display = 'none';
        document.getElementById("os").style.display = 'block';
        document.getElementById("cli-input").focus();
        renderHex('about');
        initCLI();
      }, 800);
      return;
    }
    
    let line = document.getElementById("logline-" + sIdx);
    if (!line) {
      line = document.createElement("div");
      line.id = "logline-" + sIdx;
      boot.appendChild(line);
    }
    
    line.innerText = seq[sIdx].substring(0, cIdx + 1) + (Math.random() > 0.5 ? "_" : "");
    cIdx++;
    
    if (cIdx > seq[sIdx].length) {
      line.innerText = seq[sIdx];
      sIdx++;
      cIdx = 0;
      setTimeout(typeBoot, 150);
    } else {
      setTimeout(typeBoot, 15 + Math.random() * 30);
    }
  }
  
  // HEX EDITOR DATA & LORE
  const dumps = {
    about: [

      { addr: "0804800C", hl: ["89","E5","83","EC"], asm: "mov ebp, esp ; INIT_ILYA_CORE", asc: "...." },
      { addr: "08048010", hl: ["31","C0","40","CD"], asm: "xor eax, eax ; RED_TEAM_OP_ACTIVE", asc: "1.@" },
      { addr: "08048014", hl: ["E8","BD","FF","FF"], asm: "call KERNEL_EXPLOIT_DEPLOY", asc: "...." },
      { addr: "08048018", hl: ["0F","05","90","90"], asm: "syscall ; eBPF_HELLFIRE_HOOKS_LOADED", asc: "...." },
      { addr: "0804801C", hl: ["48","83","C4","18"], asm: "add rsp, 0x18 ; MARTIAL_ARTS_STRIKE", asc: "H..." },
      { addr: "08049000", hl: ["B1","00","D6","66"], asm: "; [SECTION .data] // WEAPONIZED_PAYLOADS & C2", asc: "...f" },
      { addr: "08049004", hl: ["52","55","53","54"], asm: "db 'RUST', 0", asc: "RUST" },
      { addr: "08049008", hl: ["43","2F","43","2B"], asm: "db 'C/C++', 0", asc: "C/C+" },
      { addr: "0804900C", hl: ["65","42","50","46"], asm: "db 'eBPF', 0", asc: "eBPF" },
      { addr: "08049010", hl: ["58","44","50","00"], asm: "db 'XDP', 0", asc: "XDP." },
      { addr: "0804A000", hl: ["E8","A3","13","00"], asm: "CALL 0x666 ; // SUMMONING_RITUAL (CONTACT)", asc: "...." },
      { addr: "0804A004", hl: ["47","49","54","48"], asm: "db 'GITHUB: m4rba4s', 0", asc: "GITH" },
      { addr: "0804A008", hl: ["52","45","41","4C"], asm: "db 'REALITY: NULL', 0", asc: "REAL" }
    ],
    articles: [
      { addr: "0804C000", hl: ["41","52","54","49"], asm: "; [SECTION .data] // 0DAY_RESEARCH_DUMP", asc: "ARTI" },
      { addr: "0804C004", hl: ["4B","45","52","4E"], asm: "db 'KERNEL_BYPASS_ARCHITECTURE', 0", asc: "KERN" },
      { addr: "0804C008", hl: ["45","4C","5F","42"], asm: "db 'EBPF_STEALTH_TECHNIQUES', 0", asc: "EL_B" },
      { addr: "0804C00C", hl: ["59","50","41","53"], asm: "call 0x0804E100 ; READ_ARTICLE", asc: "YPAS" },
      { addr: "0804C010", hl: ["53","5F","41","52"], asm: "db 'XDP_FIREWALL_EVASION_NOTES', 0", asc: "S_AR" },
      { addr: "0804C014", hl: ["54","49","43","4C"], asm: "ret", asc: "TICL" },
      { addr: "0804C018", hl: ["00","00","00","00"], asm: "nop ; NO_MORE_KNOWLEDGE_ALLOWED", asc: "...." },
      { addr: "0804C01C", hl: ["00","00","00","00"], asm: "nop", asc: "...." }
    ],
    projects: [
      { addr: "0804D000", hl: ["50","52","4F","4A"], asm: "; [SECTION .rodata] // MALWARE_AND_C2_INFRA", asc: "PROJ" },
      { addr: "0804D004", hl: ["4D","41","4C","57"], asm: "db 'ABYSS_C2_FRAMEWORK', 0", asc: "MALW" },
      { addr: "0804D008", hl: ["41","52","45","5F"], asm: "db 'GOLANG_RANSOM_STUB', 0", asc: "ARE_" },
      { addr: "0804D00C", hl: ["50","41","59","4C"], asm: "db 'LINUX_ROOTKIT_V3', 0", asc: "PAYL" },
      { addr: "0804D010", hl: ["4F","41","44","53"], asm: "db 'OFFENSIVE_RUST_TOOLS', 0", asc: "OADS" },
      { addr: "0804D014", hl: ["E8","13","37","00"], asm: "call KERNEL_PANIC_INIT", asc: "...." },
      { addr: "0804D018", hl: ["00","00","00","00"], asm: "hlt", asc: "...." },
      { addr: "0804D01C", hl: ["00","00","00","00"], asm: "hlt", asc: "...." }
    ]
  };

  const grid = document.getElementById("hexGrid");

  function renderHex(tabId) {
    const header = grid.querySelector('.hex-header');
    grid.innerHTML = '';
    if (header) grid.appendChild(header);

    dumps[tabId].forEach((r, i) => {
      const row = document.createElement("div");
      row.className = "hex-row";
      
      const addr = document.createElement("div");
      addr.className = "addr";
      addr.innerText = "0x" + r.addr;
      row.appendChild(addr);
      
      const hexes = document.createElement("div");
      hexes.className = "hex";
      r.hl.forEach((h, j) => {
        let s = document.createElement("span");
        s.innerText = h;
        s.dataset.row = i;
        s.dataset.idx = j;
        hexes.appendChild(s);
      });
      row.appendChild(hexes);
      
      const asm = document.createElement("div");
      asm.className = "asm";
      asm.id = "asm-" + i;
      asm.innerText = r.asm;
      row.appendChild(asm);
      
      const asc = document.createElement("div");
      asc.className = "ascii";
      r.asc.split('').forEach((c, j) => {
        let s = document.createElement("span");
        s.innerText = c;
        s.id = `asc-${i}-${j}`;
        asc.appendChild(s);
      });
      row.appendChild(asc);
      
      grid.appendChild(row);

      Array.from(hexes.children).forEach((span) => {
        span.addEventListener("mouseenter", () => {
          asm.classList.add("hl-active");
          const charSpan = document.getElementById(`asc-${span.dataset.row}-${span.dataset.idx}`);
          if(charSpan) charSpan.classList.add("hl-active");
          span.classList.add("hl-active");
        });
        
        span.addEventListener("mouseleave", () => {
          asm.classList.remove("hl-active");
          const charSpan = document.getElementById(`asc-${span.dataset.row}-${span.dataset.idx}`);
          if(charSpan) charSpan.classList.remove("hl-active");
          span.classList.remove("hl-active");
        });
      });
    });
  }

  function switchTab(tabId, el) {
    document.querySelectorAll('.sys-nav .nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    
    document.body.classList.add('glitch-shake');
    setTimeout(() => document.body.classList.remove('glitch-shake'), 150);
    
    renderHex(tabId);
  }

  // CLI LOGIC
  function initCLI() {
    const cliInput = document.getElementById('cli-input');
    const cliOutput = document.getElementById('cli-output');
    
    document.addEventListener('click', () => cliInput.focus());

    cliInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const val = this.value.trim().toLowerCase();
        this.value = '';
        appendLog(`<span class="prompt">root@baphomet</span><span class="prompt-separator">:</span><span class="prompt-dir">~#</span> <span style="color:#FFF">${val}</span>`);
        
        if (val === 'whoami') {
          appendLog('m4rba4s | ILYA<br/>- RED TEAM OPERATOR<br/>- KERNEL EXPLOIT / eBPF ARCHITECT<br/>- MARTIAL ARTIST ⸸');
        } else if (val === 'help') {
          appendLog('AVAILABLE BINARIES: whoami, execute_order_666, clear, sigkill');
        } else if (val === 'execute_order_666') {
          document.body.classList.add('glitch-shake');
          setTimeout(() => document.body.classList.remove('glitch-shake'), 800);
          
          const rawSkull = `
<pre class="baphomet-art">
      /\\      
     /  \\     
    /____\\    
   /      \\   
  /________\\  
   ⸸ 666 ⸸    
</pre>`;
          appendLog(rawSkull);
        } else if (val === 'clear') {
          cliOutput.innerHTML = '';
        } else if (val === 'sigkill') {
          document.body.innerHTML = '<div style="color:#FF003C; font-size: 24px; padding: 50px;">KERNEL PANIC - NOT SYNCING: FATAL SIGNAL 9<br/>m4rba4s_SOUL.bin CORRUPTED.</div>';
        } else if (val !== '') {
          appendLog(`bash: ${val}: command not found. You lack the privileges.`);
        }
        
        window.scrollTo(0, document.body.scrollHeight);
      }
    });

    function appendLog(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      div.style.marginBottom = '12px';
      cliOutput.appendChild(div);
    }
  }

  // IGNITE BOOT Sequence
  window.onload = () => {
    typeBoot();
  };
</script>

</body>
</html>
