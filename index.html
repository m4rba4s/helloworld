<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>m4rba4s | SYSTEM NECROMANCER</title>
<style>
  :root {
    --bg-color: #050505;
    --opcode-color: #00FF41;
    --hex-color: #FF003C;
    --comment-color: #4A4A4A;
    --glitch-1: #FF00FF;
    --glitch-2: #00FFFF;
  }

  body, html {
    background: var(--bg-color);
    color: var(--opcode-color);
    font-family: 'Fira Code', 'Courier New', Consolas, monospace;
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow-x: hidden;
    text-shadow: 0 0 3px var(--opcode-color);
  }

  /* CRT Filter & Scanlines */
  body::after {
    content: " ";
    display: block;
    position: fixed;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 999;
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
    opacity: 0.1;
  }

  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100vh); }
  }

  .scanline-bar {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 8px;
    background: rgba(0, 255, 65, 0.15);
    opacity: 0.6;
    animation: scanline 6s linear infinite;
    pointer-events: none;
    z-index: 1000;
  }

  @keyframes flicker {
    0% { opacity: 0.95; }
    5% { opacity: 0.85; }
    10% { opacity: 0.95; }
    15% { opacity: 1; }
    100% { opacity: 1; }
  }

  .screen-container {
    padding: 24px;
    height: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Top Header */
  .sys-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid var(--comment-color);
    padding-bottom: 16px;
    margin-bottom: 16px;
  }
  .sys-subtitle {
    font-size: 12px;
    color: var(--comment-color);
    margin-bottom: 4px;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .sys-title {
    font-size: 30px;
    font-weight: bold;
    letter-spacing: -0.05em;
    color: var(--opcode-color);
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0;
  }
  .sys-title .skull {
    color: var(--hex-color);
  }
  .sys-title .badge {
    font-size: 12px;
    background: var(--opcode-color);
    color: var(--bg-color);
    padding: 0 4px;
    margin-left: 8px;
    letter-spacing: normal;
  }
  .sys-info {
    text-align: right;
    font-size: 12px;
    color: var(--comment-color);
  }
  .sys-info .threat {
    color: var(--hex-color);
    font-size: 10px;
    margin-top: 4px;
  }

  /* Boot Sequence */
  #boot-sequence {
    background: #0a0a0a;
    border: 1px solid var(--comment-color);
    padding: 12px;
    font-size: 11px;
    line-height: normal;
    min-height: 20px;
  }

  /* OS Container */
  #os {
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    overflow: hidden;
  }

  .sys-nav {
    display: flex;
    gap: 8px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: -1px;
    z-index: 10;
  }
  .sys-nav .nav-item {
    padding: 8px 16px;
    color: var(--comment-color);
    cursor: pointer;
    border: 1px solid var(--comment-color);
    background: #050505;
    transition: all 0.2s;
  }
  .sys-nav .nav-item:hover {
    color: var(--opcode-color);
    background: #0a0a0a;
  }
  .sys-nav .nav-item.active {
    color: var(--hex-color);
    text-shadow: 0 0 5px var(--hex-color);
    border-bottom-color: #080808;
    background: #080808;
    position: relative;
    z-index: 12;
  }

  /* Layout */
  #hexGrid {
    flex-grow: 1;
    border: 1px solid var(--comment-color);
    background: #080808;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  /* Design HTML Hex Header */
  .hex-header {
    display: grid;
    grid-template-columns: 100px 1fr 240px 160px;
    background: #111;
  }
  .hex-header > div {
    padding: 8px;
    border-bottom: 1px solid var(--comment-color);
    color: var(--comment-color);
    font-weight: bold;
  }
  .hex-header > div:not(:last-child) {
    border-right: 1px solid var(--comment-color);
  }

  .hex-row {
    display: grid;
    grid-template-columns: 100px 1fr 240px 160px;
  }

  .hex-row > div {
    padding: 8px;
    border-bottom: 1px solid #1a1a1a;
  }
  .hex-row > div:not(:last-child) {
    border-right: 1px solid #1a1a1a;
  }
  
  .ascii {
    opacity: 0.6;
  }

  .addr { color: var(--comment-color); }
  .asm { color: var(--comment-color); }
  
  .hex span, .ascii span {
    cursor: crosshair;
    transition: color 0.1s, text-shadow 0.1s;
    display: inline-block;
  }

  .hex {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hex span { padding-right: 4px; }

  /* Hover Resonance Classes */
  .hl-active {
    color: var(--hex-color) !important;
    text-shadow: 0 0 8px var(--hex-color) !important;
    font-weight: bold;
  }

  /* CLI Container */
  #cli-container {
    margin-top: auto;
    padding: 16px;
    background: #080808;
    border-top: 2px solid var(--hex-color);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .cli-input-line {
    display: flex;
    align-items: center;
  }

  .prompt {
    color: var(--hex-color);
    font-weight: bold;
    white-space: nowrap;
  }
  .prompt-separator {
    color: var(--comment-color);
    margin: 0 4px;
  }
  .prompt-dir {
    color: var(--opcode-color);
    margin-right: 12px;
  }

  #cli-input {
    background: transparent;
    border: none;
    color: var(--opcode-color);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    flex-grow: 1;
    letter-spacing: 0.025em;
  }

  #cli-output {
    margin-bottom: 10px;
    font-size: 12px;
  }

  .baphomet-art {
    color: var(--hex-color);
    text-shadow: 0 0 5px var(--hex-color);
    font-size: 12px;
    line-height: 1.1;
  }

  /* Glitch Protocol */
  .glitch-shake {
    animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
  }

  @keyframes shake {
    10%, 90% { transform: translate3d(-3px, 0, 0); }
    20%, 80% { transform: translate3d(5px, 0, 0); filter: hue-rotate(90deg); }
    30%, 50%, 70% { transform: translate3d(-10px, 0, 0); }
    40%, 60% { transform: translate3d(10px, 0, 0); filter: invert(1); }
  }

  ::-webkit-scrollbar {
    width: 8px;
    background: var(--bg-color);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--comment-color);
  }

  .watermark {
    position: absolute;
    bottom: 48px;
    right: 48px;
    color: var(--hex-color);
    opacity: 0.05;
    user-select: none;
    pointer-events: none;
    font-size: 128px;
    line-height: 1;
  }


</style>
</head>
<body>

<div class="scanline-bar"></div>

<div class="screen-container">
  <header class="sys-header">
    <div>
      <div class="sys-subtitle">// ABADDON-UI v6.6.6 :: KERNEL_LOAD_SUCCESSFUL</div>
      <h1 class="sys-title">
        <span class="skull">⛧</span> m4rba4s <span class="badge">ROOT</span>
      </h1>
    </div>
    <div class="sys-info">
      <div>IP_SOURCE: 127.0.0.1</div>
      <div>UPTIME: 666:00:13:37</div>
      <div class="threat">[!] THREAT_LEVEL: OMEGA</div>
    </div>
  </header>

  <div id="boot-sequence"></div>
  
  <div id="os" style="display: none;">
    <nav class="sys-nav">
      <div class="nav-item active" onclick="switchTab('about', this)">[ .text // ABOUT ]</div>
      <div class="nav-item" onclick="switchTab('articles', this)">[ .data // ARTICLES ]</div>
      <div class="nav-item" onclick="switchTab('projects', this)">[ .rodata // PROJECTS ]</div>
    </nav>
    <div id="hexGrid">
      <div class="hex-header">
        <div>OFFSET</div>
        <div>HEXADECIMAL PAYLOAD</div>
        <div>DISASSEMBLY / OPCODES</div>
        <div>ASCII_DUMP</div>
      </div>
    </div>
    
    <div id="cli-container">
      <div id="cli-output"></div>
      <div class="cli-input-line">
        <span class="prompt">root@baphomet</span><span class="prompt-separator">:</span><span class="prompt-dir">~#</span>
        <input type="text" id="cli-input" autocomplete="off" spellcheck="false" autofocus>
      </div>
    </div>
  </div>

  <div class="watermark">⛧</div>
</div>

<script>
  // BOOT SEQUENCE LOGIC
  const seq = [
    "MOUNTING /dev/hades... [OK]",
    "LOADING eBPF_HELLFIRE_HOOKS... [OK]",
    "DECRYPTING m4rba4s_SOUL.bin... [OK]",
    "SYSCALL HIJACKING COMPLETE...",
    "WELCOME TO THE ABYSS ⸸"
  ];
  
  const boot = document.getElementById("boot-sequence");
  let sIdx = 0;
  let cIdx = 0;
  
  function typeBoot() {
    if (sIdx >= seq.length) {
      setTimeout(() => {
        boot.style.display = 'none';
        document.getElementById("os").style.display = 'flex';
        document.getElementById("cli-input").focus();
        renderHex('about');
        initCLI();
      }, 800);
      return;
    }
    
    let line = document.getElementById("logline-" + sIdx);
    if (!line) {
      line = document.createElement("div");
      line.id = "logline-" + sIdx;
      boot.appendChild(line);
    }
    
    line.innerText = seq[sIdx].substring(0, cIdx + 1) + (Math.random() > 0.5 ? "_" : "");
    cIdx++;
    
    if (cIdx > seq[sIdx].length) {
      line.innerText = seq[sIdx];
      sIdx++;
      cIdx = 0;
      setTimeout(typeBoot, 150);
    } else {
      setTimeout(typeBoot, 15 + Math.random() * 30);
    }
  }
  
  // HEX EDITOR DATA & LORE
  const generateDump = (text, startAddrHex) => {
    let addr = parseInt(startAddrHex, 16);
    let lines = text.trim().split('\n');
    let rows = [];

    lines.forEach(line => {
      let content = line.trim();
      if (!content) {
        rows.push({
          addr: addr.toString(16).padStart(8, '0').toUpperCase(),
          hl: Array(16).fill("00"),
          asm: "nop",
          asc: "................"
        });
        addr += 16;
        return;
      }

      let strChunks = content.match(/.{1,16}/g) || [];
      strChunks.forEach((chunk, idx) => {
        let hl = chunk.split('').map(c => c.charCodeAt(0).toString(16).padStart(2, '0').toUpperCase());
        while (hl.length < 16) hl.push("00");
        
        let asc = chunk.replace(/[^ -~]/g, '.');
        while (asc.length < 16) asc += ".";

        let asm = "";
        if (content.startsWith("[")) {
            asm = idx === 0 ? content : "";
        } else if (content.startsWith("- ")) {
            asm = idx === 0 ? `jmp 0x${(addr + 0x20).toString(16).toUpperCase()} ; ${chunk}` : `; ${chunk}`;
        } else if (idx === 0) {
            asm = `db "${chunk.replace(/"/g, '\\"')}"`;
        } else {
            asm = `; ${chunk}`; 
        }
        
        rows.push({
          addr: addr.toString(16).padStart(8, '0').toUpperCase(),
          hl: hl,
          asm: asm,
          asc: asc
        });
        addr += 16;
      });
    });
    return rows;
  };

  const aboutText = `
[SECTION .text] // DEMONIC_ENTITY_DUMP

I am a Offensive Security Specialist and Red Team Operator. My primary focus is lateral movement, post-exploitation, and breaking down enterprise infrastructure. I don't just run standard tools - I build custom utilities, diving deep into low-level systems, eBPF, reverse engineering, and firmware.

My mindset is shaped by years of military engineering and over two decades in combat sports (MMA/BJJ). The philosophy remains the same whether on the tatami or in the terminal: analyze the structure, find the vulnerability, exploit the balance, and leave no trace. If it compiles, it can be broken.
`;

  const articlesText = `
[SECTION .data] // ARTICLES

Mutable state and active research.
This section contains my technical write-ups, vulnerability research, and thoughts on offensive security.

Topics I cover:
- APT-level tactics and evasion techniques.
- Bypassing modern isolation (Docker, WebAssembly).
- Kernel-space networking and eBPF exploitation.
- Occasional reflections on cosmology, physics, and molecular biology, because the universe is just another system to reverse-engineer.
`;

  const projectsText = `
[SECTION .rodata] // PROJECTS

Immutable artifacts of execution.
A selection of my custom architecture and offensive tooling:

- Aegis-eBPF: A high-performance, low-level Linux kernel firewall project.
- Custom Red Team Arsenal: Various undocumented utilities, payload generators, and low-level scripts designed to bypass modern EDRs and establish persistence.
`;

  const dumps = {
    about: generateDump(aboutText, "08048000"),
    articles: generateDump(articlesText, "0804C000"),
    projects: generateDump(projectsText, "0804D000")
  };

  const grid = document.getElementById("hexGrid");

  function renderHex(tabId) {
    const header = grid.querySelector('.hex-header');
    grid.innerHTML = '';
    if (header) grid.appendChild(header);

    dumps[tabId].forEach((r, i) => {
      const row = document.createElement("div");
      row.className = "hex-row";
      
      const addr = document.createElement("div");
      addr.className = "addr";
      addr.innerText = "0x" + r.addr;
      row.appendChild(addr);
      
      const hexes = document.createElement("div");
      hexes.className = "hex";
      r.hl.forEach((h, j) => {
        let s = document.createElement("span");
        s.innerText = h;
        s.dataset.row = i;
        s.dataset.idx = j;
        hexes.appendChild(s);
      });
      row.appendChild(hexes);
      
      const asm = document.createElement("div");
      asm.className = "asm";
      asm.id = "asm-" + i;
      asm.innerText = r.asm;
      row.appendChild(asm);
      
      const asc = document.createElement("div");
      asc.className = "ascii";
      r.asc.split('').forEach((c, j) => {
        let s = document.createElement("span");
        s.innerText = c;
        s.id = `asc-${i}-${j}`;
        asc.appendChild(s);
      });
      row.appendChild(asc);
      
      grid.appendChild(row);

      Array.from(hexes.children).forEach((span) => {
        span.addEventListener("mouseenter", () => {
          asm.classList.add("hl-active");
          const charSpan = document.getElementById(`asc-${span.dataset.row}-${span.dataset.idx}`);
          if(charSpan) charSpan.classList.add("hl-active");
          span.classList.add("hl-active");
        });
        
        span.addEventListener("mouseleave", () => {
          asm.classList.remove("hl-active");
          const charSpan = document.getElementById(`asc-${span.dataset.row}-${span.dataset.idx}`);
          if(charSpan) charSpan.classList.remove("hl-active");
          span.classList.remove("hl-active");
        });
      });
    });
  }

  function switchTab(tabId, el) {
    document.querySelectorAll('.sys-nav .nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    
    document.body.classList.add('glitch-shake');
    setTimeout(() => document.body.classList.remove('glitch-shake'), 150);
    
    renderHex(tabId);
  }

  // CLI LOGIC
  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function initCLI() {
    const cliInput = document.getElementById('cli-input');
    const cliOutput = document.getElementById('cli-output');
    
    document.addEventListener('click', () => cliInput.focus());

    cliInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const val = this.value.trim().toLowerCase();
        const escapedVal = escapeHTML(val);
        this.value = '';
        appendLog(`<span class="prompt">root@baphomet</span><span class="prompt-separator">:</span><span class="prompt-dir">~#</span> <span style="color:#FFF">${escapedVal}</span>`);
        
        if (val === 'whoami') {
          appendLog('m4rba4s  or 0utspoken<br/>- RED TEAM OPERATOR<br/>- KERNEL EXPLOIT / eBPF ARCHITECT<br/>- MARTIAL ARTIST ⸸ Illustrator');
        } else if (val === 'help') {
          appendLog('AVAILABLE BINARIES: whoami, execute_order_666, clear, sigkill');
        } else if (val === 'execute_order_666') {
          document.body.classList.add('glitch-shake');
          setTimeout(() => document.body.classList.remove('glitch-shake'), 800);
          
          const rawSkull = `
<pre class="baphomet-art">
      /\\      
     /  \\     
    /____\\    
   /      \\   
  /________\\  
   ⸸ 666 ⸸    
</pre>`;
          appendLog(rawSkull);
        } else if (val === 'clear') {
          cliOutput.innerHTML = '';
        } else if (val === 'sigkill') {
          document.body.innerHTML = '<div style="color:#FF003C; font-size: 24px; padding: 50px;">KERNEL PANIC - NOT SYNCING: FATAL SIGNAL 9<br/>m4rba4s_SOUL.bin CORRUPTED.</div>';
        } else if (val !== '') {
          appendLog(`bash: ${escapedVal}: command not found. You lack the privileges.`);
        }
        
        window.scrollTo(0, document.body.scrollHeight);
      }
    });

    function appendLog(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      div.style.marginBottom = '12px';
      cliOutput.appendChild(div);
    }
  }

  // IGNITE BOOT Sequence
  window.onload = () => {
    typeBoot();
  };
</script>

</body>
</html>
